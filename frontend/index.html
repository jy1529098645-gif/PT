<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Highlight Recovery — RAW 高光恢复 / 局部曝光</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <h1>Highlight Recovery</h1>
      <span class="brand-sub">RAW · 局部曝光 · iPhone 风格调整</span>
    </div>
    <div class="meta" id="fileMeta">
      <span class="muted">尚未载入文件</span>
    </div>
    <div class="actions">
      <label class="btn ghost">
        <input type="file" id="fileInput" accept=".cr2,.cr3,.nef,.nrw,.arw,.srf,.sr2,.dng,.raf,.orf,.rw2,.pef,.rwl,.iiq,.3fr,.fff,.mrw,.dcr,.kdc" hidden>
        载入 RAW
      </label>
      <button class="btn ghost" id="resetBtn" disabled>重置参数</button>
      <div class="export-group">
        <select id="exportFormat" class="select-mini">
          <option value="jpeg">JPEG</option>
          <option value="png">PNG</option>
          <option value="tiff">TIFF (16-bit)</option>
        </select>
        <button class="btn primary" id="exportBtn" disabled>导出</button>
      </div>
    </div>
  </header>

  <main class="workspace">
    <aside class="sidebar left">
      <div class="section-title">
        <h2>预设</h2>
        <span class="muted small">单击应用 · 双击仅复制参数</span>
      </div>
      <div class="presets" id="presetsList"></div>
    </aside>

    <section class="canvas">
      <div class="dropzone" id="dropzone">
        <div class="dropzone-inner">
          <div class="dropzone-icon"></div>
          <p class="dropzone-title">拖入 RAW 文件到这里</p>
          <p class="dropzone-sub muted">或点击右上角 <b>载入 RAW</b>。支持 CR2 / CR3 / NEF / ARW / DNG / RAF / ORF / RW2 / PEF 等</p>
        </div>
      </div>
      <div class="preview-wrap hidden" id="previewWrap">
        <div class="preview-stage" id="previewStage">
          <img class="preview-img base" id="previewBase" alt="">
          <img class="preview-img top" id="previewTop" alt="">
          <div class="compare-handle" id="compareHandle">
            <div class="handle-bar"></div>
            <div class="handle-knob"></div>
          </div>
          <div class="mask-overlay" id="maskOverlay"></div>
        </div>
        <div class="preview-bar">
          <label class="compare-toggle">
            <input type="checkbox" id="compareToggle" checked>
            <span>对比模式（左：原图 / 右：处理后）</span>
          </label>
          <span class="muted small" id="timingInfo"></span>
        </div>
      </div>
      <div class="busy" id="busy">
        <div class="busy-spinner"></div>
        <p id="busyText">处理中…</p>
      </div>
    </section>

    <aside class="sidebar right">
      <nav class="tabs" id="paramTabs">
        <button class="tab active" data-tab="basic">基础</button>
        <button class="tab" data-tab="color">色彩</button>
        <button class="tab" data-tab="detail">细节</button>
        <button class="tab" data-tab="recovery">高光算法</button>
        <button class="tab" data-tab="local">局部</button>
      </nav>

      <div class="tab-panel active" data-panel="basic" id="panelBasic"></div>
      <div class="tab-panel" data-panel="color" id="panelColor"></div>
      <div class="tab-panel" data-panel="detail" id="panelDetail"></div>
      <div class="tab-panel" data-panel="recovery" id="panelRecovery"></div>

      <div class="tab-panel local" data-panel="local" id="panelLocal">
        <div class="local-actions">
          <button class="btn-mini" id="addRadialBtn">+ 径向蒙版</button>
          <button class="btn-mini" id="addLinearBtn">+ 渐变蒙版</button>
        </div>
        <div class="local-help muted small">
          添加后可在预览图上拖动蒙版（中心点移动 / 边手柄改大小 / 渐变端点改方向）。
          每个蒙版内可独立调整曝光、高光、阴影、对比度、饱和度、色温色调。
        </div>
        <div class="mask-list" id="maskList"></div>
      </div>
    </aside>
  </main>

  <div class="toast" id="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
